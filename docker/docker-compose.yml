version: '3.8'

services:
  marzban:
    image: gozargah/marzban:latest
    container_name: vpn-marzban
    restart: always
    env_file: .env
    environment:
      SQLALCHEMY_DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mariadb/marzban_db
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8000"
      UVICORN_SSL_CERTFILE: "/var/lib/marzban/cert.pem"
      UVICORN_SSL_KEYFILE: "/var/lib/marzban/key.pem"
      UVICORN_SSL_CA_TYPE: "private"
      XRAY_JSON: "/var/lib/marzban/xray_config.json"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - vpn-network
    ports:
      - "127.0.0.1:8000:8000"  # Marzban panel (SSH tunnel для доступа)
      - "8443:8443"             # VLESS TCP REALITY
      - "2053:2053"             # VLESS GRPC REALITY
    volumes:
      - /var/lib/marzban:/var/lib/marzban
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, ssl; urllib.request.urlopen('https://localhost:8000/', context=ssl._create_unverified_context())"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s


  # === MariaDB - База данных ===
  mariadb:
    image: mariadb:lts
    container_name: vpn-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-vpn_service}
      MYSQL_USER: ${DB_USER:-vpn_user}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_HOST: '%'
    command:
      - --bind-address=0.0.0.0
      - --character_set_server=utf8mb4
      - --collation_server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
    volumes:
      - /var/lib/vpn-service/mysql:/var/lib/mysql
      - ./mysql-init/create-marzban-db.sql:/docker-entrypoint-initdb.d/create-marzban-db.sql:ro
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # === Redis - Кэш и сессии ===
  redis:
    image: redis:7-alpine
    container_name: vpn-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - /var/lib/vpn-service/redis:/data
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # === Telegram Bot ===
  bot:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    container_name: vpn-bot
    restart: always
    env_file: .env
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${DB_USER:-vpn_user}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-vpn_service}
      - REDIS_HOST=redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      marzban:
        condition: service_healthy
    networks:
      - vpn-network
    volumes:
      - /var/log/vpn-service/bot:/var/log/bot

  # === Web App ===
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: vpn-web
    restart: always
    env_file: .env
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${DB_USER:-vpn_user}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-vpn_service}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - vpn-network

  # === Worker (фоновые задачи) ===
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    container_name: vpn-worker
    restart: always
    env_file: .env
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${DB_USER:-vpn_user}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-vpn_service}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - vpn-network

  # === Caddy - Reverse Proxy ===
  caddy:
    image: caddy:latest
    container_name: vpn-caddy
    restart: always
    network_mode: host
    volumes:
      - ../configs/Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/lib/vpn-service/caddy:/data
      - /var/lib/vpn-service/caddy-config:/config
    cap_add:
      - NET_BIND_SERVICE

networks:
  vpn-network:
    driver: bridge
