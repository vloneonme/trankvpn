---
# Ansible Playbook для развертывания VPN сервиса
# Использование: ansible-playbook -i inventory.ini deploy.yml

- name: Deploy VPN Service
  hosts: vpn_servers
  become: yes
  vars:
    project_name: vpn-service
    project_dir: /opt/vpn-service
    docker_compose_url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
    
  tasks:
    # === Предварительные требования ===
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - python3-pip
          - git
          - curl
          - openssl
        state: present

    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    # === Клонирование репозитория ===
    - name: Clone repository
      git:
        repo: "{{ repo_url | default('https://github.com/yourusername/vpn-service.git') }}"
        dest: "{{ project_dir }}"
        version: main
        force: yes

    # === Генерация секретов ===
    - name: Generate encryption key
      shell: openssl rand -base64 32
      register: encryption_key
      changed_when: false

    - name: Create .env file
      template:
        src: templates/env.j2
        dest: "{{ project_dir }}/docker/.env"
        mode: '0600'
      vars:
        enc_key: "{{ encryption_key.stdout }}"

    # === Создание директорий ===
    - name: Create data directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /var/lib/vpn-service/mysql
        - /var/lib/vpn-service/redis
        - /var/lib/vpn-service/caddy
        - /var/lib/vpn-service/caddy-config
        - /var/log/vpn-service/bot

    # === Развертывание ===
    - name: Deploy with Docker Compose
      community.docker.docker_compose:
        project_src: "{{ project_dir }}/docker"
        files:
          - docker-compose.yml
        state: present
        build: yes
        pull: no
        restart: yes

    # === Настройка автозапуска ===
    - name: Enable Docker auto-start
      systemd:
        name: docker
        enabled: yes

    # === Проверка статуса ===
    - name: Check services status
      command: docker-compose ps
      args:
        chdir: "{{ project_dir }}/docker"
      register: compose_status
      changed_when: false

    - name: Display status
      debug:
        var: compose_status.stdout_lines

    # === Бэкап (опционально) ===
    - name: Setup backup cron job
      cron:
        name: "VPN Service Backup"
        minute: "0"
        hour: "3"
        job: "cd {{ project_dir }}/scripts && ./backup.sh >> /var/log/vpn-service/backup.log 2>&1"
      when: setup_backup | default(false)

  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted

```
