version: '3.8'

services:
  # === MariaDB - База данных ===
  mariadb:
    image: mariadb:lts
    container_name: vpn-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-vpn_service}
      MYSQL_USER: ${DB_USER:-vpn_user}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_HOST: '%'
    command:
      - --bind-address=127.0.0.1
      - --character_set_server=utf8mb4
      - --collation_server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
    volumes:
      - /var/lib/vpn-service/mysql:/var/lib/mysql
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

  # === Redis - Кэш и сессии ===
  redis:
    image: redis:7-alpine
    container_name: vpn-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - /var/lib/vpn-service/redis:/data
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # === Telegram Bot ===
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: vpn-bot
    restart: always
    env_file: .env
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${DB_USER:-vpn_user}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-vpn_service}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vpn-network
    volumes:
      - /var/log/vpn-service/bot:/var/log/bot

  # === Web App (MTProto) ===
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vpn-web
    restart: always
    env_file: .env
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${DB_USER:-vpn_user}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-vpn_service}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - vpn-network
    labels:
      - "caddy.autodiscover=true"

  # === Worker (фоновые задачи) ===
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: vpn-worker
    restart: always
    env_file: .env
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${DB_USER:-vpn_user}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-vpn_service}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - vpn-network

  # === Caddy - Reverse Proxy ===
  caddy:
    image: caddy:latest
    container_name: vpn-caddy
    restart: always
    network_mode: host
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/lib/vpn-service/caddy:/data
      - /var/lib/vpn-service/caddy-config:/config
    cap_add:
      - NET_BIND_SERVICE

networks:
  vpn-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
