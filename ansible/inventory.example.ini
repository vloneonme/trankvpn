# Пример inventory-файла для Ansible
# Скопируйте в inventory.ini и подставьте свои данные

[vpn_servers]
# Вариант 1 — root по паролю
# 1.2.3.4 ansible_user=root ansible_password=ВАШ_ПАРОЛЬ

# Вариант 2 — root по SSH-ключу (рекомендуется)
1.2.3.4 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

# Вариант 3 — обычный пользователь с sudo
# 1.2.3.4 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_become=yes
